# Render Blueprint: one-click deploy of the backend + a free Postgres instance.
# In Render: New > Blueprint > connect this repo.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory
